<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <title>App JS</title>
</head>

<body>
    <div class="container">
        <header class="header">
            <a class="logo" href="https://github.com/DeveloperSergeyL">DeveloperSergey</a>
            <nav>
                <ul>
                    <li><a href="#counter">Counter</a></li>
                    <li><a href="#blog">Blog</a></li>
                    <li><a href="#expense">Expenses</a></li>
                    <li><a href="html/movielist.html">Movie List</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="counter" id="counter">
                <h2>Counter</h2>
                <div class="counter__resylt">
                    <p class="resylt">0</p>
                </div>
                <div class="counter__button">
                    <button class="counter__button-plus">+1 Бассейн</button>
                    <button class="counter__button-reset">Сбросить</button>
                </div>
            </section>
            <section class="blog" id="blog">
                <h2>Blog</h2>
                <div class="blog__body">
                    <div class="blog__new-post">
                        <h3 class="blog__title">Новый пост</h3>
                        <div class="blog__form">
                            <input type="text" class="blog__input blog__input--title" placeholder="Заголовок">
                            <textarea type="text" class="blog__input blog__input--post"
                                placeholder="Напиши пост"></textarea>
                            <button class="blog__button">Опубликовать</button>
                            <p class="validation-message"></p>
                        </div>
                    </div>
                    <div class="blog__posts">
                        <h3 class="blog__title">Лента</h3>
                        <div class="blog__content">
                            <p class="empty">Тут пока пусто...</p>
                        </div>
                    </div>
                </div>
            </section>
            <section class="expense" id="expense">
                <h2>Expenses</h2>
                <div class="expense__body">
                    <h3 class="expense__title">Учет расходов</h3>
                    <form class="expense-form">
                        <div class="expense-form__spending">
                            <input type="number" class="expense-form__spending-input" placeholder="Введите сумму">
                            <span class="expense-form__spending-currency">руб.</span>
                            <button class="expense-form__spending-btn-add">
                                Добавить
                            </button>
                        </div>

                        <select class="expense-form__list">
                            <option value="транспорт" class="expense-form__list-transport">транспорт</option>
                            <option value="кафе и рестораны" class="expense-form__list-cafe">кафе и рестораны</option>
                            <option value="аптека" class="expense-form__list-pharmacy">аптека</option>
                            <option value="развлечения" class="expense-form__list-entertainment">развлечения</option>
                        </select>
                    </form>
                    <div class="expense-info">
                        <div class="expense-info__status">
                            <p class="expense-info__limit">
                                <span>Лимит: </span>
                                <span class="expense-info__limit-value">10000</span>
                                <span> руб.</span>
                                <img src="img/expenses/img-1.png" alt="Изменить" class="expense-info__limit-img-change">
                            </p>

                            <p class="expense-info__total">
                                Всего: <span class="expense-info__total-value">0</span> руб.
                            </p>

                            <p class="expense-info__state">
                                Статус: <span class="expense-info__state-value expense-info__state-value--good">все
                                    хорошо</span>
                            </p>
                        </div>
                        <div class="popup  ">
                            <div class="popup__content">
                                <h3 class="popup__title">Новый лимит</h3>
                                <div class="popup__spending">
                                    <input type="number" class="popup__spending-input" placeholder="Введите сумму">
                                    <span class="popup__spending-currency">руб.</span>
                                    <button class="popup__spending-btn-change">
                                        Задать лимит
                                    </button>
                                    <div class="popup__close-btn "></div>
                                </div>
                            </div>
                        </div>
                        <div class="expense-info__history">
                            <div class="expense-info__history-title">История:</div>
                            <ol class="expense-info__history-list"></ol>
                        </div>
                    </div>
                    <button class="expense__btn-reset">Сбросить расходы</button>
                </div>
            </section>
        </main>
        <footer>

        </footer>
    </div>
</body>

<script type="module" src="js/script.js"></script>

</html>
